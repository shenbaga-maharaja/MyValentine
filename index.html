<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Me 💚 You</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --pink-deep:  #d63062;
      --pink-mid:   #ff4d7e;
      --pink-light: #ff8fa8;
      --text-mid:   #7b2d44;
      --shadow:     rgba(214,48,98,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #ffe0eb 0%, #ffc8da 45%, #ffaac4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 80px;
      position: relative;
    }

    /* Floating Hearts Background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 0; }
      10%  { opacity: 0.65; }
      90%  { opacity: 0.45; }
      100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255,255,255,0.65);
      border-radius: 28px;
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow:
        0 10px 40px var(--shadow),
        0 2px 8px rgba(214,48,98,0.10),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: cardIn 0.8s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn {
      from { transform: scale(0.75) translateY(40px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    /* Title */
    .title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.55rem, 6vw, 2rem);
      color: var(--pink-deep);
      line-height: 1.25;
      margin-bottom: 16px;
      animation: fadeDown 0.7s 0.3s ease both;
    }
    .pulse-heart {
      display: inline-block;
      animation: heartbeat 1.2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1);   }
      14%     { transform: scale(1.35);}
      28%     { transform: scale(1);   }
      42%     { transform: scale(1.2); }
    }

    /* Image */
    .img-wrap {
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px var(--shadow);
      animation: fadeDown 0.7s 0.45s ease both;
      background: linear-gradient(135deg,#ffe0eb,#ffc8da);
    }
    .img-wrap svg { width:100%; height:220px; display:block; }

    /* Subtitle */
    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 4vw, 1.18rem);
      color: var(--text-mid);
      margin-bottom: 22px;
      animation: fadeDown 0.7s 0.6s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Buttons row — both side by side */
    .btn-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      animation: fadeDown 0.7s 0.75s ease both;
    }

    #yes {
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      font-family: 'Dancing Script', cursive;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #1a9e4a, #2ecc71);
      color: #fff;
      box-shadow: 0 5px 22px rgba(26,158,74,0.40);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    #yes:hover  { transform:scale(1.08); box-shadow:0 7px 28px rgba(26,158,74,0.5); }
    #yes:active { transform:scale(0.96); }

    /* NO Button — dances inside #mainCard */
    #no {
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      font-family: 'Dancing Script', cursive;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #no.dancing {
      position: absolute;
      z-index: 20;
      transition: left 0.13s cubic-bezier(.34,1.56,.64,1),
                  top  0.13s cubic-bezier(.34,1.56,.64,1),
                  background 0.3s;
    }
    #no:hover { background: linear-gradient(135deg,#a93226,#c0392b); }

    /* YES Full-Screen Page */
    #yes-page {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: linear-gradient(135deg, #d63062 0%, #ff4d7e 55%, #ff8fa8 100%);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 30px 24px;
    }
    #yes-page.show { display:flex; animation: bgIn 0.5s ease both; }
    @keyframes bgIn { from{opacity:0;} to{opacity:1;} }

    .yes-content { color:#fff; max-width:360px; }

    .yes-img-wrap {
      width:150px; height:150px;
      border-radius:50%;
      overflow:hidden;
      margin:0 auto 16px;
      border:4px solid rgba(255,255,255,0.55);
      box-shadow:0 6px 24px rgba(0,0,0,0.2);
      animation: popIn 0.5s 0.1s cubic-bezier(.34,1.56,.64,1) both;
      background:rgba(255,255,255,0.15);
    }
    .yes-img-wrap svg { width:100%; height:100%; }

    .yes-emoji {
      font-size: clamp(2.6rem,10vw,4.2rem);
      display:block; margin-bottom:10px;
      animation: popIn 0.5s 0.22s cubic-bezier(.34,1.56,.64,1) both;
    }
    .yes-name {
      font-family:'Dancing Script',cursive;
      font-size:clamp(2.2rem,9vw,3.4rem);
      font-weight:700;
      animation:popIn 0.5s 0.38s cubic-bezier(.34,1.56,.64,1) both;
      margin-bottom:6px;
    }
    .yes-love {
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:clamp(1.1rem,5vw,1.5rem);
      animation:popIn 0.5s 0.54s cubic-bezier(.34,1.56,.64,1) both;
      margin-bottom:18px;
    }
    .yes-msg {
      font-family:'Lato',sans-serif; font-weight:300;
      font-size:clamp(0.95rem,3.5vw,1.1rem);
      line-height:1.75;
      animation:popIn 0.5s 0.68s cubic-bezier(.34,1.56,.64,1) both;
      opacity:0.92; margin-bottom:22px;
    }
    .yes-sign {
      font-family:'Dancing Script',cursive;
      font-size:clamp(1.1rem,4.5vw,1.4rem);
      animation:popIn 0.5s 0.82s cubic-bezier(.34,1.56,.64,1) both;
      opacity:0.88;
    }
    @keyframes popIn {
      from{transform:scale(0);opacity:0;}
      to  {transform:scale(1);opacity:1;}
    }

    /* Confetti */
    .confetti-heart {
      position:fixed; pointer-events:none;
      animation:confettiFall linear forwards; z-index:600;
    }
    @keyframes confettiFall {
      0%  {transform:translateY(-20px) rotate(0deg);   opacity:1;}
      100%{transform:translateY(115vh) rotate(720deg); opacity:0;}
    }

    /* Responsive */
    @media(max-width:380px){
      .card{padding:26px 16px 22px;}
      #yes{padding:12px 36px;font-size:1.1rem;}
      #no {padding:11px 20px;font-size:1rem;bottom:16px;right:16px;}
    }
    @media(min-width:600px){
      .card{padding:40px 44px 36px;}
    }
      50%      { box-shadow: 0 0 0 10px rgba(255,255,255,0.12); }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <!-- ══ MAIN CARD ══ -->
  <div class="card" id="mainCard">

    <h1 class="title">
      Me <span class="pulse-heart">💚</span> You
    </h1>

    <!-- Cute bear-couple SVG (no external URL needed) -->
    <div class="img-wrap">
      <svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe0eb"/>
            <stop offset="100%" stop-color="#ffc2d4"/>
          </linearGradient>
          <linearGradient id="grnd" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffb3c6"/>
            <stop offset="100%" stop-color="#ff85a1"/>
          </linearGradient>
        </defs>
        <rect width="400" height="220" fill="url(#sky)"/>
        <ellipse cx="200" cy="235" rx="240" ry="55" fill="url(#grnd)"/>

        <!-- deco hearts -->
        <text x="55"  y="44" font-size="18" opacity=".5">💕</text>
        <text x="308" y="37" font-size="14" opacity=".45">💖</text>
        <text x="178" y="27" font-size="22" opacity=".55">💚</text>
        <text x="128" y="62" font-size="12" opacity=".38">💗</text>
        <text x="260" y="58" font-size="16" opacity=".42">💓</text>

        <!-- ── Bear Boy (Me) ── -->
        <ellipse cx="128" cy="177" rx="32" ry="36" fill="#c8a882"/>
        <circle  cx="128" cy="129" r="30"  fill="#d4b896"/>
        <circle  cx="104" cy="107" r="11"  fill="#c8a882"/>
        <circle  cx="152" cy="107" r="11"  fill="#c8a882"/>
        <circle  cx="104" cy="107" r="6"   fill="#e8c9aa"/>
        <circle  cx="152" cy="107" r="6"   fill="#e8c9aa"/>
        <circle  cx="121" cy="125" r="4"   fill="#5c3d2e"/>
        <circle  cx="135" cy="125" r="4"   fill="#5c3d2e"/>
        <circle  cx="122" cy="124" r="1.5" fill="#fff"/>
        <circle  cx="136" cy="124" r="1.5" fill="#fff"/>
        <ellipse cx="128" cy="133" rx="5"  ry="3.5" fill="#a07850"/>
        <path d="M121 139 Q128 146 135 139" stroke="#5c3d2e" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="114" cy="134" rx="7" ry="4" fill="#ff9ab2" opacity=".4"/>
        <ellipse cx="142" cy="134" rx="7" ry="4" fill="#ff9ab2" opacity=".4"/>
        <!-- bow tie -->
        <polygon points="120,159 128,164 136,159 128,154" fill="#d63062"/>
        <circle  cx="128" cy="159" r="4" fill="#ff4d7e"/>
        <!-- arm toward girl -->
        <ellipse cx="163" cy="169" rx="10" ry="20" fill="#c8a882" transform="rotate(-25 163 169)"/>

        <!-- ── Bear Girl (You) ── -->
        <ellipse cx="272" cy="177" rx="32" ry="36" fill="#c8a882"/>
        <ellipse cx="272" cy="202" rx="34" ry="18" fill="#ff85a1"/>
        <circle  cx="272" cy="129" r="30"  fill="#d4b896"/>
        <circle  cx="248" cy="107" r="11"  fill="#c8a882"/>
        <circle  cx="296" cy="107" r="11"  fill="#c8a882"/>
        <circle  cx="248" cy="107" r="6"   fill="#e8c9aa"/>
        <circle  cx="296" cy="107" r="6"   fill="#e8c9aa"/>
        <!-- bow -->
        <ellipse cx="272" cy="101" rx="18" ry="8" fill="#d63062"/>
        <ellipse cx="260" cy="100" rx="10" ry="7" fill="#ff4d7e" transform="rotate(-20 260 100)"/>
        <ellipse cx="284" cy="100" rx="10" ry="7" fill="#ff4d7e" transform="rotate(20 284 100)"/>
        <circle  cx="272" cy="101" r="5"  fill="#d63062"/>
        <circle  cx="265" cy="125" r="4"   fill="#5c3d2e"/>
        <circle  cx="279" cy="125" r="4"   fill="#5c3d2e"/>
        <circle  cx="266" cy="124" r="1.5" fill="#fff"/>
        <circle  cx="280" cy="124" r="1.5" fill="#fff"/>
        <!-- lashes -->
        <line x1="262" y1="121" x2="260" y2="118" stroke="#5c3d2e" stroke-width="1.5"/>
        <line x1="265" y1="120" x2="265" y2="117" stroke="#5c3d2e" stroke-width="1.5"/>
        <line x1="268" y1="121" x2="270" y2="118" stroke="#5c3d2e" stroke-width="1.5"/>
        <line x1="276" y1="120" x2="274" y2="117" stroke="#5c3d2e" stroke-width="1.5"/>
        <line x1="279" y1="120" x2="279" y2="117" stroke="#5c3d2e" stroke-width="1.5"/>
        <line x1="282" y1="121" x2="284" y2="118" stroke="#5c3d2e" stroke-width="1.5"/>
        <ellipse cx="272" cy="133" rx="5"  ry="3.5" fill="#a07850"/>
        <path d="M265 139 Q272 146 279 139" stroke="#5c3d2e" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="258" cy="134" rx="7" ry="4" fill="#ff9ab2" opacity=".45"/>
        <ellipse cx="286" cy="134" rx="7" ry="4" fill="#ff9ab2" opacity=".45"/>
        <!-- arm toward boy -->
        <ellipse cx="237" cy="169" rx="10" ry="20" fill="#c8a882" transform="rotate(25 237 169)"/>

        <!-- joined hands -->
        <circle cx="200" cy="170" r="14" fill="#d4b896"/>
        <circle cx="200" cy="170" r="10" fill="#c8a882"/>

        <!-- big heart above -->
        <text x="186" y="82" font-size="28" opacity=".9">💚</text>

        <!-- name labels -->
        <text x="128" y="219" font-family="Georgia,serif" font-size="11" fill="#7b2d44" text-anchor="middle" opacity=".8">Me</text>
        <text x="272" y="219" font-family="Georgia,serif" font-size="11" fill="#7b2d44" text-anchor="middle" opacity=".8">You</text>
      </svg>
    </div>

    <p class="subtitle">Will you be my Valentine? 💖</p>

    <!-- Both buttons side by side -->
    <div class="btn-row">
      <button id="yes">YES 💚</button>
      <button id="no">NO 😜</button>
    </div>

  </div><!-- /card -->

  <!-- ══ YES PAGE ══ -->
  <div id="yes-page">
    <div class="yes-content">
      <div class="yes-img-wrap">
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle cx="80" cy="80" r="80" fill="#ff4d7e"/>
          <text x="80" y="95" font-size="66" text-anchor="middle" dominant-baseline="middle">💚</text>
          <text x="22"  y="32"  font-size="18" opacity=".8">✨</text>
          <text x="118" y="36"  font-size="16" opacity=".8">✨</text>
          <text x="30"  y="134" font-size="14" opacity=".7">💕</text>
          <text x="112" y="134" font-size="14" opacity=".7">💕</text>
        </svg>
      </div>
      <span class="yes-emoji">🥳</span>
      <div class="yes-name">You 💖</div>
      <div class="yes-love">I love you so much 💚</div>
      <p class="yes-msg">
        You are my happiness, my heart,<br>and my everything 💕<br><br>
        Forever and always, yours alone...
      </p>
      <div class="yes-sign">— Me 🌹</div>

    </div>
  </div>

  <script>
    /* Floating hearts */
    const heartsBg = document.getElementById('heartsBg');
    const emojis   = ['💚','💕','💓','💗','💖','🌸','💞','✨'];

    function spawnHeart() {
      const h = document.createElement('span');
      h.className = 'heart-float';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left  = Math.random() * 100 + 'vw';
      const dur = 7 + Math.random() * 8, delay = Math.random() * 3;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay   = delay + 's';
      h.style.fontSize = (0.8 + Math.random() * 1.1) + 'rem';
      heartsBg.appendChild(h);
      setTimeout(() => h.remove(), (dur + delay) * 1000);
    }
    for (let i = 0; i < 20; i++) spawnHeart();
    setInterval(spawnHeart, 650);

    /* NO button — flies around the ENTIRE viewport */
    const noBtn  = document.getElementById('no');
    const yesBtn = document.getElementById('yes');

    const messages = [
      "No, please! 🥺","Think again… 😢","Are you really sure? 😭",
      "Don't break my heart 💔","Please say YES! 😍","This is your last chance 😜",
      "Please, just say YES 😭💚","I will seriously cry 😢","This should be illegal 😤",
      "How could you reject me? 😭","You clicked the wrong button 😜",
      "System error — please click YES 😆","Only YES is working 😂","Heart damage loading… 💔",
      "I trusted you with my heart 😭","I am very sad right now 😢","Please try again 😏",
      "The NO button is broken, try YES 😜","Please, I am begging you 😭💚","Say YES quickly! 😍",
      "Do not test my patience 😤","Love is loading… click YES 💚",
      "You cannot escape this 😆","Final warning — choose wisely 😜","Okay, I give up… just kidding! 😏"
    ];
    let msgIdx = 0;

    noBtn.addEventListener('click', function () {
      noBtn.textContent = messages[msgIdx];
      msgIdx = (msgIdx + 1) % messages.length;

      // Switch to dancing (absolute inside card) on first click
      const card = document.getElementById('mainCard');
      if (!noBtn.classList.contains('dancing')) {
        noBtn.classList.add('dancing');
        card.appendChild(noBtn); // move into card so absolute is relative to it
      }

      const bW  = noBtn.offsetWidth  || 110;
      const bH  = noBtn.offsetHeight || 46;
      const cW  = card.offsetWidth;
      const cH  = card.offsetHeight;
      const m   = 10;

      const rx = m + Math.random() * (cW - bW - m * 2);
      const ry = m + Math.random() * (cH - bH - m * 2);

      noBtn.style.left   = rx + 'px';
      noBtn.style.top    = ry + 'px';
      noBtn.style.right  = 'auto';
      noBtn.style.bottom = 'auto';
    });

    /* YES button */
    yesBtn.addEventListener('click', function () {
      noBtn.style.display = 'none';
      document.getElementById('mainCard').style.display = 'none';
      const yesPage = document.getElementById('yes-page');
      yesPage.classList.add('show');
      spawnConfetti(70);
      let t = setInterval(() => spawnConfetti(8), 750);
      setTimeout(() => clearInterval(t), 8000);

      // Countdown timer — reload main card after 30 seconds
      let remaining = 15;


      const countdown = setInterval(() => {
        remaining--;

        if (remaining <= 0) {
          clearInterval(countdown);
          // Hide YES page, restore main card & NO button
          window.location.reload();
        }
      }, 1000);
    });

    function spawnConfetti(count) {
      const items = ['💚','💕','💖','🌸','💞','✨','🌹','💝','🎉'];
      for (let i = 0; i < count; i++) {
        const el = document.createElement('span');
        el.className = 'confetti-heart';
        el.textContent = items[Math.floor(Math.random() * items.length)];
        el.style.left  = Math.random() * 100 + 'vw';
        el.style.top   = '-30px';
        const dur = 3 + Math.random() * 3.5, del = Math.random() * 1.8;
        el.style.animationDuration = dur + 's';
        el.style.animationDelay   = del + 's';
        el.style.fontSize = (1 + Math.random() * 1.4) + 'rem';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur + del + 0.5) * 1000);
      }
    }
  </script>
</body>
</html>
